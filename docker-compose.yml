services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: valentinum
      POSTGRES_USER: valentinum
      POSTGRES_PASSWORD: valentinum
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U valentinum -d valentinum"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - valentinum_postgres_data:/var/lib/postgresql/data

volumes:
  valentinum_postgres_data:
